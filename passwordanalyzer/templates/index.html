<!DOCTYPE html>
<html>
<head>
    <title>Password Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app-container">
    <div class="card">
        <h1>🔐 Password Analyzer</h1>

        <form method="POST" onsubmit="showLoading()">
            <input type="password" name="password" placeholder="Enter password..." required>

            <label style="font-size: 14px; display: flex; align-items: center; gap: 6px; margin-top: 8px;">
                <input type="checkbox" onclick="togglePassword()"> Show Password
            </label>

            <button type="submit">Analyze</button>
        </form>

        <!-- Loading Spinner -->
        <div id="loading" style="display:none; text-align:center; margin-top:15px;">
            <div class="spinner"></div>
            <p style="font-size:14px; color:#555;">Analyzing...</p>
        </div>

        {% if result %}
        <div class="result">
            <h2>{{ result.strength }} ({{ result.score }}/6)</h2>

            <div class="strength-bar">
                <div class="strength-fill {{ result.strength }}"></div>
            </div>

            <p><strong>Crack Time:</strong> {{ result.crack_time }}</p>

            <ul>
                {% for item in result.feedback %}
                    <li>{{ item }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</div>

<script>
function togglePassword() {
    const input = document.querySelector('input[name="password"]');
    input.type = input.type === "password" ? "text" : "password";
}

function showLoading() {
    document.getElementById("loading").style.display = "block";
}
</script>

</body>
</html>
